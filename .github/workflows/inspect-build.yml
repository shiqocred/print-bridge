name: "inspect-build-artifacts"

on:
  workflow_dispatch:

jobs:
  inspect-build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""
            bundle_path: "src-tauri/target/release/bundle"
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
            bundle_path: "src-tauri/target/universal-apple-darwin/release/bundle"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: bun install

      - name: build tauri app
        id: tauri_build
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: 🔍 Debugging & Log Inspection
        shell: bash
        run: |
          echo "=========================================================="
          echo "🚀 SPECIFIC INSPECTION FOR PLATFORM: ${{ matrix.platform }}"
          echo "=========================================================="

          SEARCH_PATH="${{ matrix.bundle_path }}"

          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
            echo "🍎 MACOS TARGET"
            # Mencari .dmg dan .tar.gz
            DMG_FILE=$(find "$SEARCH_PATH" -type f -name "*.dmg")
            TAR_GZ_FILE=$(find "$SEARCH_PATH" -type f -name "*.tar.gz")
            SIG_FILE=$(find "$SEARCH_PATH" -type f -name "*.tar.gz.sig")

            echo "📦 DMG Installer: $DMG_FILE"
            echo "📦 Updater Bundle: $TAR_GZ_FILE"

            if [ -f "$SIG_FILE" ]; then
              echo "📝 Found Signature (.tar.gz.sig): $SIG_FILE"
              echo "------------------- CONTENT OF .TAR.GZ.SIG -------------------"
              cat "$SIG_FILE"
              echo ""
              echo "--------------------------------------------------------------"
            else
              echo "❌ ERROR: .tar.gz.sig not found!"
            fi

          else
            echo "💻 WINDOWS TARGET"
            # Mencari .exe (NSIS) dan .exe.sig
            EXE_FILE=$(find "$SEARCH_PATH" -type f -name "*-setup.exe")
            SIG_FILE="$EXE_FILE.sig"

            echo "📦 EXE Installer: $EXE_FILE"

            if [ -f "$SIG_FILE" ]; then
              echo "📝 Found Signature (.exe.sig): $SIG_FILE"
              echo "------------------- CONTENT OF .EXE.SIG -------------------"
              cat "$SIG_FILE"
              echo ""
              echo "-----------------------------------------------------------"
            else
              echo "❌ ERROR: .exe.sig not found!"
            fi
          fi
          echo "=========================================================="
