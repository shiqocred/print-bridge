name: "inspect-build-artifacts"

on:
  workflow_dispatch:

jobs:
  inspect-build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""
            bundle_path: "src-tauri/target/release/bundle"
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
            bundle_path: "src-tauri/target/universal-apple-darwin/release/bundle"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: bun install

      - name: build tauri app
        id: tauri_build
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: 🔍 Debugging & Log Inspection
        shell: bash
        run: |
          # Mengambil versi aplikasi dari output tauri-action
          VERSION="${{ steps.tauri_build.outputs.appVersion }}"

          echo "=========================================================="
          echo "🚀 PLATFORM: ${{ matrix.platform }}"
          echo "📦 DETECTED VERSION: $VERSION"
          echo "=========================================================="

          SEARCH_PATH="${{ matrix.bundle_path }}"

          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
            echo "🍎 MACOS (Universal)"
            # Mencari installer (.dmg) dan updater (.tar.gz)
            DMG_FILE=$(find "$SEARCH_PATH" -type f -name "*.dmg")
            TAR_GZ_FILE=$(find "$SEARCH_PATH" -type f -name "*.tar.gz")
            SIG_FILE=$(find "$SEARCH_PATH" -type f -name "*.tar.gz.sig")

            echo "✅ DMG: $DMG_FILE"
            echo "✅ Bundle: $TAR_GZ_FILE"

            echo "------------------- CONTENT OF .TAR.GZ.SIG -------------------"
            [ -f "$SIG_FILE" ] && cat "$SIG_FILE" || echo "❌ Signature not found!"
            echo "--------------------------------------------------------------"

          else
            echo "💻 WINDOWS (x64)"
            # Mencari installer (.exe)
            EXE_FILE=$(find "$SEARCH_PATH" -type f -name "*-setup.exe")
            SIG_FILE="$EXE_FILE.sig"

            echo "✅ EXE: $EXE_FILE"

            echo "------------------- CONTENT OF .EXE.SIG -------------------"
            [ -f "$SIG_FILE" ] && cat "$SIG_FILE" || echo "❌ Signature not found!"
            echo "-----------------------------------------------------------"
          fi

          echo "=========================================================="
